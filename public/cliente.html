<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ServiRed — Cliente</title>
<script src="/socket.io/socket.io.js"></script>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#0f172a;color:#e2e8f0;min-height:100vh}
.container{max-width:480px;margin:0 auto;padding:20px}
.header{text-align:center;padding:20px 0}
.header h1{color:#3b82f6;font-size:1.5rem}
.section{background:#1e293b;border-radius:12px;padding:16px;margin:16px 0;border:1px solid #334155}
.btn{width:100%;padding:14px;border:none;border-radius:8px;font-size:1rem;font-weight:600;cursor:pointer;transition:all .2s;margin-top:8px}
.btn-primary{background:#3b82f6;color:#fff}
.btn-success{background:#22c55e;color:#fff}
.btn-danger{background:#ef4444;color:#fff}
.btn-chat{background:#6366f1;color:#fff}
.btn-outline{background:transparent;border:2px solid #3b82f6;color:#3b82f6}
input,select,textarea{width:100%;padding:12px;margin:8px 0;border-radius:8px;border:1px solid #334155;background:#0f172a;color:#e2e8f0;font-size:1rem}
.hidden{display:none!important}
.estado-box{padding:16px;border-radius:8px;text-align:center;margin:12px 0;font-weight:700}
.estado-buscando{background:#f59e0b;color:#0f172a;animation:pulse 2s infinite}
.estado-aceptada{background:#22c55e;color:#fff}
.estado-proceso{background:#6366f1;color:#fff}
.estado-realizada{background:#8b5cf6;color:#fff}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.7}}
#mapaWorker{height:220px;border-radius:10px;margin-top:12px;border:2px solid #22c55e}
/* CHAT MODAL */
#chat-modal{display:none;position:fixed;inset:0;z-index:9999;background:rgba(0,0,0,.75);align-items:flex-end;justify-content:center}
#chat-modal.abierto{display:flex}
.chat-box{width:100%;max-width:480px;height:72vh;background:#0d0d1a;border-top:2px solid #00E5FF;border-radius:16px 16px 0 0;display:flex;flex-direction:column}
.chat-header{display:flex;align-items:center;justify-content:space-between;padding:14px 18px;border-bottom:1px solid #1a1a3a}
.chat-titulo{color:#00E5FF;font-weight:700;font-size:15px}
.chat-cerrar{background:none;border:none;color:#aaa;font-size:22px;cursor:pointer}
#chat-mensajes{flex:1;overflow-y:auto;padding:14px 16px;display:flex;flex-direction:column;gap:10px}
#chat-typing{padding:0 16px 4px;color:#888;font-size:12px;min-height:18px}
.chat-input-row{display:flex;gap:8px;padding:12px 16px;border-top:1px solid #1a1a3a}
#chat-input{flex:1;background:#1a1a2e;border:1px solid #00E5FF44;border-radius:22px;padding:10px 16px;color:#fff;font-size:14px;outline:none}
.chat-send{background:#00E5FF;border:none;border-radius:50%;width:42px;height:42px;cursor:pointer;font-size:18px;flex-shrink:0}
.burbuja-wrap{display:flex;flex-direction:column}
.burbuja-wrap.propio{align-items:flex-end}
.burbuja-wrap.ajeno{align-items:flex-start}
.burbuja{max-width:75%;border-radius:16px;padding:9px 13px;font-size:14px;word-break:break-word}
.burbuja.propio{background:#00E5FF22;border:1px solid #00E5FF55;color:#fff;border-radius:16px 16px 4px 16px}
.burbuja.ajeno{background:#1a1a3a;border:1px solid #333;color:#fff;border-radius:16px 16px 16px 4px}
.burbuja-nombre{font-size:11px;color:#888;margin-bottom:2px}
.burbuja-hora{font-size:10px;color:#555;margin-top:3px}
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <h1>🏠 ServiRed Cliente</h1>
    <p style="color:#64748b;margin-top:8px">Solicitá servicios en tiempo real</p>
  </div>

  <!-- LOGIN -->
  <div class="section" id="loginSection">
    <h3 style="color:#94a3b8;margin-bottom:12px">Ingresá tu token</h3>
    <input type="text" id="tokenInput" placeholder="Token JWT...">
    <button class="btn btn-primary" onclick="conectar()">Ingresar</button>
  </div>

  <!-- NUEVO PEDIDO -->
  <div class="section hidden" id="pedidoSection">
    <h3 style="color:#94a3b8;margin-bottom:4px">Nuevo Pedido</h3>
    <select id="tipoServicio">
      <option value="">¿Qué necesitás?</option>
      <option value="plomeria">🚿 Plomería</option>
      <option value="electricidad">⚡ Electricidad</option>
      <option value="gasista">🔥 Gasista</option>
      <option value="cerrajeria">🔑 Cerrajería</option>
      <option value="servicio_domestico">🧹 Servicio Doméstico</option>
      <option value="pintura">🎨 Pintura</option>
      <option value="albanileria">🧱 Albañilería</option>
      <option value="camaras">📷 Cámaras de Seguridad</option>
      <option value="alarmas">🚨 Alarmas</option>
      <option value="aire_acondicionado">❄️ Aire Acondicionado</option>
      <option value="herreria">⚙️ Herrería</option>
      <option value="carpinteria">🪵 Carpintería</option>
      <option value="mudanzas">🚚 Mudanzas</option>
      <option value="jardineria">🌿 Jardinería</option>
      <option value="limpieza">🧽 Limpieza</option>
      <option value="techista">🏚️ Techista</option>
      <option value="impermeabilizacion">💧 Impermeabilización</option>
      <option value="frigorista">🧊 Frigorista</option>
      <option value="electrodomesticos">📺 Electrodomésticos</option>
      <option value="informatica">💻 Informática</option>
      <option value="soldadura">🔩 Soldadura</option>
      <option value="fumigacion">🐜 Fumigación</option>
      <option value="piscinas">🏊 Piscinas</option>
      <option value="ascensores">🛗 Ascensores</option>
      <option value="energia_solar">☀️ Energía Solar</option>
      <option value="cuidado_adultos">👴 Cuidado de Adultos</option>
    </select>
    <select id="zona">
      <option value="">¿Zona?</option>
      <option value="palermo">Palermo</option>
      <option value="belgrano">Belgrano</option>
      <option value="recoleta">Recoleta</option>
      <option value="caballito">Caballito</option>
      <option value="san_telmo">San Telmo</option>
      <option value="nuñez">Nuñez</option>
      <option value="flores">Flores</option>
      <option value="villa_urquiza">Villa Urquiza</option>
      <option value="lanus">Lanús</option>
      <option value="quilmes">Quilmes</option>
      <option value="lomas_zamora">Lomas de Zamora</option>
      <option value="moron">Morón</option>
      <option value="tigre">Tigre</option>
      <option value="san_isidro">San Isidro</option>
      <option value="vicente_lopez">Vicente López</option>
    </select>
    <textarea id="descripcion" rows="3" placeholder="Describí el problema..."></textarea>
    <button class="btn btn-primary" onclick="crearPedido()">🔍 Buscar Especialista</button>
    <button class="btn btn-chat" onclick="abrirChatGeneral()" style="margin-top:6px">💬 Mensajes</button>
  </div>

  <!-- ESTADO DEL PEDIDO -->
  <div class="section hidden" id="estadoSection">
    <div id="estadoBox" class="estado-box estado-buscando">🔍 Buscando especialista...</div>
    <div id="workerInfo" class="hidden" style="margin-top:12px">
      <div style="background:#0f172a;padding:12px;border-radius:8px;border-left:4px solid #22c55e">
        <p style="font-weight:700;color:#22c55e" id="workerNombre"></p>
        <p style="color:#94a3b8;font-size:.9rem" id="workerRubro"></p>
        <p style="color:#94a3b8;font-size:.9rem" id="workerETA"></p>
      </div>
      <div id="mapaWorker" class="hidden"></div>
      <button class="btn btn-chat" onclick="abrirChatOrden()" style="margin-top:10px">💬 Chatear con el trabajador</button>
    </div>
    <div id="accionesCliente" class="hidden" style="margin-top:12px">
      <button class="btn btn-success" onclick="confirmarRealizado()">✅ Confirmar trabajo realizado</button>
    </div>
    <button class="btn btn-outline" onclick="cancelarPedido()" style="margin-top:8px">✕ Cancelar pedido</button>
  </div>

  <!-- CALIFICACIÓN -->
  <div class="section hidden" id="calificacionSection">
    <h3 style="color:#94a3b8;margin-bottom:12px">¿Cómo estuvo el servicio?</h3>
    <div style="text-align:center;font-size:2rem;margin:12px 0" id="estrellas">
      <span onclick="setEstrellas(1)">⭐</span><span onclick="setEstrellas(2)">⭐</span>
      <span onclick="setEstrellas(3)">⭐</span><span onclick="setEstrellas(4)">⭐</span><span onclick="setEstrellas(5)">⭐</span>
    </div>
    <textarea id="comentario" rows="2" placeholder="Comentario (opcional)..."></textarea>
    <button class="btn btn-primary" onclick="enviarCalificacion()">Enviar calificación</button>
  </div>
</div>

<!-- CHAT MODAL -->
<div id="chat-modal">
  <div class="chat-box">
    <div class="chat-header">
      <span class="chat-titulo" id="chat-titulo">💬 Chat</span>
      <button class="chat-cerrar" onclick="chatCerrar()">✕</button>
    </div>
    <div id="chat-mensajes"></div>
    <div id="chat-typing"></div>
    <div class="chat-input-row">
      <input id="chat-input" type="text" placeholder="Escribí un mensaje..." maxlength="1000"
        oninput="chatTyping()" onkeydown="if(event.key==='Enter')chatEnviar()">
      <button class="chat-send" onclick="chatEnviar()">➤</button>
    </div>
  </div>
</div>

<script>
// ── ESTADO ─────────────────────────────────────────
let socket, miToken, miId, miNombre;
let ordenActual = null;
let salaActual  = null;
let mapaL = null, markerWorker = null;
let calificacion = 5;
let typingTimer = null;

// ── AUTO LOGIN ──────────────────────────────────────
window.onload = () => {
  const t = localStorage.getItem('token');
  if (t) { document.getElementById('tokenInput').value = t; conectar(); }
};

function conectar() {
  miToken = document.getElementById('tokenInput').value.trim();
  if (!miToken) return;
  try {
    const payload = JSON.parse(atob(miToken.split('.')[1]));
    miId     = payload.id || payload._id;
    miNombre = payload.nombre || payload.email || 'Cliente';
  } catch(e) { alert('Token inválido'); return; }
  localStorage.setItem('token', miToken);
  localStorage.setItem('userId', miId);

  socket = io({ auth: { token: miToken } });

  socket.on('connect',    () => console.log('Socket conectado'));
  socket.on('disconnect', () => console.log('Socket desconectado'));

  // Orden aceptada
  socket.on('orden:aceptada', (data) => {
    ordenActual = data.ordenId;
    document.getElementById('estadoBox').className = 'estado-box estado-aceptada';
    document.getElementById('estadoBox').textContent = '✅ ¡Especialista en camino!';
    document.getElementById('workerInfo').classList.remove('hidden');
    document.getElementById('workerNombre').textContent = data.trabajadorNombre || 'Trabajador';
    document.getElementById('workerRubro').textContent  = data.rubro || '';
    document.getElementById('workerETA').textContent    = data.eta ? `ETA: ${data.eta} min` : '';
    document.getElementById('workerInfo').classList.remove('hidden');
    initMapa();
  });

  // GPS del worker
  socket.on('trabajador:ubicacion', (data) => {
    if (!mapaL) return;
    const latlng = [data.lat, data.lng];
    if (!markerWorker) {
      markerWorker = L.marker(latlng, {
        icon: L.divIcon({ html:'<div style="font-size:24px">🔧</div>', iconSize:[30,30] })
      }).addTo(mapaL);
    } else { markerWorker.setLatLng(latlng); }
    mapaL.setView(latlng, 15);
  });

  // FSM updates
  socket.on('orden:enProceso', () => {
    document.getElementById('estadoBox').className = 'estado-box estado-proceso';
    document.getElementById('estadoBox').textContent = '🔧 Trabajo en proceso...';
    document.getElementById('accionesCliente').classList.remove('hidden');
  });
  socket.on('orden:realizada', () => {
    document.getElementById('estadoBox').className = 'estado-box estado-realizada';
    document.getElementById('estadoBox').textContent = '✅ Trabajo realizado — confirmá para pagar';
    document.getElementById('accionesCliente').classList.remove('hidden');
  });
  socket.on('orden:pagada', () => {
    document.getElementById('estadoSection').classList.add('hidden');
    document.getElementById('calificacionSection').classList.remove('hidden');
  });

  // Chat
  socket.on('chat:nuevoMensaje', (msg) => {
    if (msg.salaId === salaActual) { chatAgregarBurbuja(msg); chatScrollAbajo(); }
    else { /* badge opcional */ }
  });
  socket.on('chat:escribiendo',    ({ nombre }) => { document.getElementById('chat-typing').textContent = `${nombre} está escribiendo...`; });
  socket.on('chat:dejoDeEscribir', () => { document.getElementById('chat-typing').textContent = ''; });

  document.getElementById('loginSection').classList.add('hidden');
  document.getElementById('pedidoSection').classList.remove('hidden');
}

// ── PEDIDO ──────────────────────────────────────────
function crearPedido() {
  const servicio    = document.getElementById('tipoServicio').value;
  const zona        = document.getElementById('zona').value;
  const descripcion = document.getElementById('descripcion').value.trim();
  if (!servicio || !zona) { alert('Seleccioná servicio y zona'); return; }

  socket.emit('cliente:pedido', { servicio, zona, descripcion, token: miToken });

  document.getElementById('pedidoSection').classList.add('hidden');
  document.getElementById('estadoSection').classList.remove('hidden');
  document.getElementById('estadoBox').className = 'estado-box estado-buscando';
  document.getElementById('estadoBox').textContent = '🔍 Buscando especialista...';
  document.getElementById('workerInfo').classList.add('hidden');
  document.getElementById('accionesCliente').classList.add('hidden');
}

function cancelarPedido() {
  if (!confirm('¿Cancelar pedido?')) return;
  socket.emit('cliente:cancelar', { ordenId: ordenActual });
  ordenActual = null;
  document.getElementById('estadoSection').classList.add('hidden');
  document.getElementById('pedidoSection').classList.remove('hidden');
}

function confirmarRealizado() {
  socket.emit('cliente:confirmarPago', { ordenId: ordenActual });
}

// ── MAPA ────────────────────────────────────────────
function initMapa() {
  const el = document.getElementById('mapaWorker');
  el.classList.remove('hidden');
  if (mapaL) return;
  mapaL = L.map('mapaWorker').setView([-34.6037, -58.3816], 13);
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(mapaL);
}

// ── CALIFICACIÓN ────────────────────────────────────
function setEstrellas(n) { calificacion = n; }
function enviarCalificacion() {
  const comentario = document.getElementById('comentario').value;
  socket.emit('cliente:calificar', { ordenId: ordenActual, estrellas: calificacion, comentario });
  document.getElementById('calificacionSection').classList.add('hidden');
  document.getElementById('pedidoSection').classList.remove('hidden');
  alert('¡Gracias por tu calificación!');
}

// ── CHAT ────────────────────────────────────────────
function abrirChatOrden() {
  if (!ordenActual) return;
  salaActual = 'orden_' + ordenActual;
  document.getElementById('chat-titulo').textContent = '💬 Chat con el trabajador';
  chatAbrir(salaActual);
}

function abrirChatGeneral() {
  salaActual = 'general_' + miId;
  document.getElementById('chat-titulo').textContent = '💬 Mensajes';
  chatAbrir(salaActual);
}

async function chatAbrir(salaId) {
  document.getElementById('chat-mensajes').innerHTML = '';
  document.getElementById('chat-modal').classList.add('abierto');
  document.getElementById('chat-input').focus();

  socket.emit('chat:unirse', { salaId, usuarioId: miId, nombre: miNombre, rol: 'cliente' });

  try {
    const r = await fetch('/api/mensajes/sala/' + salaId, {
      headers: { Authorization: 'Bearer ' + miToken }
    });
    const d = await r.json();
    if (d.ok) { d.mensajes.forEach(m => chatAgregarBurbuja(m)); chatScrollAbajo(); }
  } catch(e){}

  fetch('/api/mensajes/leidos/' + salaId, {
    method:'POST', headers:{ Authorization:'Bearer '+miToken }
  }).catch(()=>{});
}

function chatCerrar() {
  document.getElementById('chat-modal').classList.remove('abierto');
  salaActual = null;
}

function chatEnviar() {
  const input = document.getElementById('chat-input');
  const texto = input.value.trim();
  if (!texto || !salaActual) return;
  socket.emit('chat:mensaje', { salaId: salaActual, ordenId: ordenActual, texto });
  input.value = '';
  socket.emit('chat:dejoDeEscribir', { salaId: salaActual });
}

function chatTyping() {
  socket.emit('chat:escribiendo', { salaId: salaActual });
  clearTimeout(typingTimer);
  typingTimer = setTimeout(() => socket.emit('chat:dejoDeEscribir', { salaId: salaActual }), 1500);
}

function chatAgregarBurbuja(msg) {
  const esPropio = msg.remitente?.toString() === miId;
  const div = document.createElement('div');
  div.className = 'burbuja-wrap ' + (esPropio ? 'propio' : 'ajeno');
  const hora = new Date(msg.creadoEn).toLocaleTimeString('es-AR',{hour:'2-digit',minute:'2-digit'});
  div.innerHTML = `
    ${!esPropio ? `<span class="burbuja-nombre">${msg.remitenteNombre}</span>` : ''}
    <div class="burbuja ${esPropio?'propio':'ajeno'}">${esc(msg.texto)}</div>
    <span class="burbuja-hora">${hora}</span>`;
  document.getElementById('chat-mensajes').appendChild(div);
}

function chatScrollAbajo() {
  const c = document.getElementById('chat-mensajes');
  if(c) c.scrollTop = c.scrollHeight;
}

function esc(t) {
  return t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
</script>
</body>
</html>
