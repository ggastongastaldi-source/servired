<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cliente - ServiRed</title>
    <script src="/socket.io/socket.io.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0f172a; 
            color: #e2e8f0;
            min-height: 100vh;
        }
        .container { max-width: 480px; margin: 0 auto; padding: 20px; }
        .header { text-align: center; padding: 20px 0; }
        .header h1 { color: #3b82f6; font-size: 1.5rem; }
        
        .section { 
            background: #1e293b; 
            border-radius: 12px; 
            padding: 16px; 
            margin: 16px 0;
            border: 1px solid #334155;
        }
        
        .btn { 
            width: 100%; 
            padding: 14px; 
            border: none; 
            border-radius: 8px; 
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }
        .btn-primary { background: #3b82f6; color: white; }
        .btn-primary:hover { background: #2563eb; }
        
        .estado-box {
            padding: 16px;
            border-radius: 8px;
            text-align: center;
            margin: 12px 0;
            animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.8; }
        }
        .estado-searching { background: #f59e0b; color: #0f172a; }
        .estado-expanding { background: #3b82f6; color: white; }
        .estado-aceptada { background: #22c55e; color: white; }
        
        .pedido-card {
            background: #0f172a;
            padding: 12px;
            border-radius: 8px;
            margin: 8px 0;
            border-left: 4px solid #3b82f6;
        }
        .pedido-card.aceptado { border-left-color: #22c55e; }
        .pedido-card.buscando { border-left-color: #f59e0b; }
        
        input, select, textarea {
            width: 100%;
            padding: 12px;
            margin: 8px 0;
            border-radius: 8px;
            border: 1px solid #334155;
            background: #0f172a;
            color: #e2e8f0;
        }
        
        .hidden { display: none !important; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🏠 ServiRed Cliente</h1>
            <p style="color:#64748b;margin-top:8px;">Solicitá servicios en tiempo real</p>
        </div>

        <!-- Login -->
        <div class="section" id="loginSection">
            <h3 style="color:#94a3b8;margin-bottom:12px;">Ingresá tu token</h3>
            <input type="text" id="tokenInput" placeholder="Token JWT...">
            <button class="btn btn-primary" onclick="conectar()">Ingresar</button>
        </div>

        <!-- Formulario de Pedido -->
        <div class="section hidden" id="pedidoSection">
            <h3 style="color:#94a3b8;margin-bottom:12px;">Nuevo Pedido</h3>
            <select id="tipoServicio">
                <option value="">¿Qué necesitás?</option>
                <option value="plomeria">🚿 Plomería</option>
                <option value="electricidad">⚡ Electricidad</option>
                <option value="domestica">🧹 Servicio Doméstico</option>
                <option value="cerrajeria">🔑 Cerrajería</option>
                <option value="pintura">🎨 Pintura</option>
                <option value="gasista">🔥 Gasista</option>
                <option value="camaras">📷 Cámaras</option>
                <option value="alarmas">🚨 Alarmas</option>
            </select>
            <select id="zona">
                <option value="">¿Zona?</option>
                <option value="palermo">Palermo</option>
                <option value="belgrano">Belgrano</option>
                <option value="recoleta">Recoleta</option>
                <option value="caballito">Caballito</option>
                <option value="san_telmo">San Telmo</option>
                <option value="nuñez">Nuñez</option>
            </select>
            <textarea id="descripcion" rows="3" placeholder="Describí el problema..."></textarea>
            <button class="btn btn-primary" onclick="crearPedido()">🔍 Buscar Especialista</button>
        </div>

        <!-- Estado del Pedido Actual -->
        <div class="section hidden" id="estadoSection">
            <h3 style="color:#94a3b8;margin-bottom:12px;">Estado de tu Pedido</h3>
            <div id="estadoBox" class="estado-box">
                <h4 id="estadoTitulo">Buscando...</h4>
                <p id="estadoMensaje">Activando red de especialistas</p>
            </div>
        </div>

        <!-- Mis Pedidos -->
        <div class="section hidden" id="misPedidosSection">
            <h3 style="color:#94a3b8;margin-bottom:12px;">Mis Pedidos</h3>
            <div id="listaPedidos"></div>
        </div>
    </div>

    <script>
        const socket = io();
        let currentToken = '';
        let pedidoActual = null;

        function conectar() {
            currentToken = document.getElementById('tokenInput').value.trim();
            if (!currentToken) return alert('Token requerido');

            socket.emit('cliente_conectado', { token: currentToken });
        }

        async function crearPedido() {
            const tipo = document.getElementById('tipoServicio').value;
            const zona = document.getElementById('zona').value;
            const desc = document.getElementById('descripcion').value;

            if (!tipo || !zona) return alert('Completá servicio y zona');

            try {
                const res = await fetch('/api/pedidos', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': 'Bearer ' + currentToken
                    },
                    body: JSON.stringify({
                        tipoServicio: tipo,
                        zona: zona,
                        descripcion: desc,
                        complejidad: 'baja',
                        lat: -34.6,
                        lng: -58.4
                    })
                });
                
                const data = await res.json();
                
                if (data.ok) {
                    pedidoActual = data.pedido;
                    mostrarEstado('SEARCHING');
                    cargarMisPedidos();
                } else {
                    alert('Error: ' + data.error);
                }
            } catch(e) {
                alert('Error de conexión');
            }
        }

        function mostrarEstado(fase) {
            document.getElementById('estadoSection').classList.remove('hidden');
            const box = document.getElementById('estadoBox');
            const titulo = document.getElementById('estadoTitulo');
            const mensaje = document.getElementById('estadoMensaje');

            box.className = 'estado-box';
            
            switch(fase) {
                case 'SEARCHING':
                    box.classList.add('estado-searching');
                    titulo.textContent = '🔍 Buscando Especialista';
                    mensaje.textContent = 'Activando red de profesionales en tu zona...';
                    break;
                case 'EXPANDING_RADIUS':
                    box.classList.add('estado-expanding');
                    titulo.textContent = '🌎 Ampliando Búsqueda';
                    mensaje.textContent = 'Buscando en toda el área metropolitana...';
                    break;
                case 'ACEPTADA':
                    box.classList.add('estado-aceptada');
                    titulo.textContent = '✅ ¡Especialista Asignado!';
                    mensaje.textContent = 'Tu profesional está confirmado';
                    break;
            }
        }

        async function cargarMisPedidos() {
            try {
                const res = await fetch('/api/pedidos/mis-pedidos', {
                    headers: { 'Authorization': 'Bearer ' + currentToken }
                });
                const data = await res.json();
                
                if (data.ok) {
                    const lista = document.getElementById('listaPedidos');
                    lista.innerHTML = data.pedidos.map(p => `
                        <div class="pedido-card ${p.estado.toLowerCase()}">
                            <strong>${p.tipoServicio}</strong> - ${p.zona}<br>
                            <small style="color:#64748b;">${p.estado}</small><br>
                            <small>$${(p.total_estimado || 0).toLocaleString('es-AR')}</small>
                        </div>
                    `).join('');
                    
                    document.getElementById('misPedidosSection').classList.remove('hidden');
                }
            } catch(e) {
                console.error('Error cargando pedidos:', e);
            }
        }

        // Socket events
        socket.on('conectado_ok', () => {
            document.getElementById('loginSection').classList.add('hidden');
            document.getElementById('pedidoSection').classList.remove('hidden');
            cargarMisPedidos();
        });

        socket.on('estado_pedido', (data) => {
            console.log('Estado actualizado:', data);
            mostrarEstado(data.fase);
            
            // Notificación visual
            if ('Notification' in window && Notification.permission === 'granted') {
                new Notification(data.titulo, { body: data.mensaje });
            }
        });

        socket.on('trabajo_aceptado', (data) => {
            alert('¡Tu pedido fue aceptado! El especialista viene en camino.');
            mostrarEstado('ACEPTADA');
            cargarMisPedidos();
        });

        if ('Notification' in window && Notification.permission === 'default') {
            Notification.requestPermission();
        }
    </script>
</body>
</html>
