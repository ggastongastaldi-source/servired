<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cliente - ServiRed</title>
    <script src="/socket.io/socket.io.js"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #0f172a; color: #e2e8f0; min-height: 100vh; }
        .container { max-width: 480px; margin: 0 auto; padding: 20px; }
        .header { text-align: center; padding: 20px 0; }
        .header h1 { color: #3b82f6; font-size: 1.5rem; }
        .section { background: #1e293b; border-radius: 12px; padding: 16px; margin: 16px 0; border: 1px solid #334155; }
        .btn { width: 100%; padding: 14px; border: none; border-radius: 8px; font-size: 1rem; font-weight: 600; cursor: pointer; transition: all 0.2s; margin-top: 8px; }
        .btn-primary { background: #3b82f6; color: white; }
        .btn-primary:hover { background: #2563eb; }
        .btn-success { background: #22c55e; color: white; }
        .estado-box { padding: 16px; border-radius: 8px; text-align: center; margin: 12px 0; }
        .estado-searching { background: #f59e0b; color: #0f172a; animation: pulse 2s infinite; }
        .estado-aceptada { background: #22c55e; color: white; }
        .estado-realizada { background: #6366f1; color: white; }
        @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.7} }
        .pedido-card { background: #0f172a; padding: 12px; border-radius: 8px; margin: 8px 0; border-left: 4px solid #3b82f6; }
        input, select, textarea { width: 100%; padding: 12px; margin: 8px 0; border-radius: 8px; border: 1px solid #334155; background: #0f172a; color: #e2e8f0; font-size: 1rem; }
        .hidden { display: none !important; }
        #mapaWorker { height: 220px; border-radius: 10px; margin-top: 12px; border: 2px solid #22c55e; }
        .badge { display: inline-block; padding: 3px 10px; border-radius: 12px; font-size: 0.75rem; font-weight: 700; background: #334155; color: #94a3b8; }
        .badge.online { background: #14532d; color: #22c55e; }
        .alerta { background: #1e3a5f; border: 1px solid #3b82f6; border-radius: 10px; padding: 14px; margin: 8px 0; font-size: 0.95rem; }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1>🏠 ServiRed Cliente</h1>
        <p style="color:#64748b;margin-top:8px;">Solicitá servicios en tiempo real</p>
    </div>

    <!-- Login -->
    <div class="section" id="loginSection">
        <h3 style="color:#94a3b8;margin-bottom:12px;">Ingresá tu token</h3>
        <input type="text" id="tokenInput" placeholder="Token JWT...">
        <button class="btn btn-primary" onclick="conectar()">Ingresar</button>
    </div>

    <!-- Formulario -->
    <div class="section hidden" id="pedidoSection">
        <h3 style="color:#94a3b8;margin-bottom:4px;">Nuevo Pedido</h3>
        <select id="tipoServicio">
            <option value="">¿Qué necesitás?</option>
            <option value="plomeria">🚿 Plomería</option>
            <option value="electricidad">⚡ Electricidad</option>
            <option value="domestica">🧹 Servicio Doméstico</option>
            <option value="cerrajeria">🔑 Cerrajería</option>
            <option value="pintura">🎨 Pintura</option>
            <option value="gasista">🔥 Gasista</option>
            <option value="camaras">📷 Cámaras</option>
            <option value="alarmas">🚨 Alarmas</option>
            <option value="albanileria">🧱 Albañilería</option>
            <option value="aire_acondicionado">❄️ Aire Acondicionado</option>
      <option value="herreria">⚙️ Herrería</option>
      <option value="carpinteria">🪵 Carpintería</option>
      <option value="mudanzas">🚚 Mudanzas</option>
      <option value="jardineria">🌿 Jardinería</option>
      <option value="limpieza">🧽 Limpieza</option>
      <option value="techista">🏚️ Techista</option>
      <option value="impermeabilizacion">💧 Impermeabilización</option>
      <option value="frigorista">🧊 Frigorista</option>
      <option value="electrodomesticos">📺 Electrodomésticos</option>
      <option value="informatica">💻 Informática</option>
      <option value="soldadura">🔩 Soldadura</option>
      <option value="fumigacion">🐜 Fumigación</option>
      <option value="piscinas">🏊 Piscinas</option>
      <option value="ascensores">🛗 Ascensores</option>
      <option value="energia_solar">☀️ Energía Solar</option>
      <option value="cuidado_adultos">👴 Cuidado de Adultos</option>
        </select>
        <select id="zona">
            <option value="">¿Zona?</option>
            <option value="palermo">Palermo</option>
            <option value="belgrano">Belgrano</option>
            <option value="recoleta">Recoleta</option>
            <option value="caballito">Caballito</option>
            <option value="san_telmo">San Telmo</option>
            <option value="nuñez">Nuñez</option>
            <option value="flores">Flores</option>
            <option value="villa_urquiza">Villa Urquiza</option>
      <option value="la_matanza">La Matanza</option>
      <option value="lanus">Lanús</option>
      <option value="quilmes">Quilmes</option>
      <option value="lomas_zamora">Lomas de Zamora</option>
      <option value="moron">Morón</option>
      <option value="tigre">Tigre</option>
      <option value="san_isidro">San Isidro</option>
      <option value="vicente_lopez">Vicente López</option>
      <option value="tres_febrero">Tres de Febrero</option>
      <option value="merlo">Merlo</option>
        </select>
        <textarea id="descripcion" rows="3" placeholder="Describí el problema..."></textarea>
        <button class="btn btn-primary" id="btnBuscar" onclick="crearPedido()">🔍 Buscar Especialista</button>
    </div>

    <!-- Estado del pedido -->
    <div class="section hidden" id="estadoSection">
        <h3 style="color:#94a3b8;margin-bottom:4px;">Estado de tu Pedido</h3>
        <div id="estadoBox" class="estado-box estado-searching">
            <h4 id="estadoTitulo">🔍 Buscando Especialista</h4>
            <p id="estadoMensaje">Activando red de profesionales en tu zona...</p>
        </div>
        <div id="infoWorker" class="hidden alerta">
            <strong>👷 Profesional en camino</strong>
            <p id="workerNombre" style="margin-top:4px;color:#94a3b8;"></p>
        </div>
        <div id="mapaWorker" class="hidden"></div>
        <button id="btnConfirmarPago" class="btn btn-success hidden" onclick="confirmarPago()">✅ Confirmar Pago</button>
    </div>

    <!-- Mis Pedidos -->
    <div class="section hidden" id="misPedidosSection">
        <h3 style="color:#94a3b8;margin-bottom:8px;">Mis Pedidos</h3>
        <div id="listaPedidos"></div>
    </div>
</div>

<script>
    const socket = io();
    let currentToken = '';
    let currentUserId = '';
    let pedidoActual = null;
    let mapa = null;
    let markerWorker = null;

    // Decodificar JWT sin librería (solo payload, no verifica firma)
    function decodeJWT(token) {
        try {
            const payload = token.split('.')[1];
            return JSON.parse(atob(payload.replace(/-/g,'+').replace(/_/g,'/')));
        } catch(e) { return {}; }
    }

    function conectar() {
        currentToken = document.getElementById('tokenInput').value.trim();
        if (!currentToken) return alert('Token requerido');
        const decoded = decodeJWT(currentToken);
        currentUserId = decoded.userId || decoded.id || '';
        socket.emit('cliente_conectado', { token: currentToken, userId: currentUserId });
    }

    async function crearPedido() {
        const tipo = document.getElementById('tipoServicio').value;
        const zona = document.getElementById('zona').value;
        const desc = document.getElementById('descripcion').value;
        if (!tipo || !zona) return alert('Completá servicio y zona');

        document.getElementById('btnBuscar').disabled = true;
        document.getElementById('btnBuscar').textContent = '⏳ Enviando...';

        try {
            // Intentar obtener GPS real
            let lat = -34.6, lng = -58.4;
            try {
                const pos = await new Promise((res, rej) =>
                    navigator.geolocation.getCurrentPosition(res, rej, { timeout: 4000 })
                );
                lat = pos.coords.latitude;
                lng = pos.coords.longitude;
            } catch(e) {}

            const res = await fetch('/api/pedidos', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': 'Bearer ' + currentToken
                },
                body: JSON.stringify({ tipoServicio: tipo, zona, descripcion: desc, complejidad: 'baja', lat, lng })
            });

            const data = await res.json();
            if (data.ok) {
                pedidoActual = data.pedido;
                // ← Clave: registrar pedido en socket para recibir updates
                socket.emit('registrar_pedido', { pedidoId: pedidoActual._id });
                mostrarEstado('SEARCHING');
                document.getElementById('pedidoSection').classList.add('hidden');
                cargarMisPedidos();
            } else {
                alert('Error: ' + (data.error || 'desconocido'));
                document.getElementById('btnBuscar').disabled = false;
                document.getElementById('btnBuscar').textContent = '🔍 Buscar Especialista';
            }
        } catch(e) {
            alert('Error de conexión');
            document.getElementById('btnBuscar').disabled = false;
            document.getElementById('btnBuscar').textContent = '🔍 Buscar Especialista';
        }
    }

    function mostrarEstado(fase) {
        document.getElementById('estadoSection').classList.remove('hidden');
        const box = document.getElementById('estadoBox');
        const titulo = document.getElementById('estadoTitulo');
        const msg = document.getElementById('estadoMensaje');
        box.className = 'estado-box';

        if (fase === 'SEARCHING') {
            box.classList.add('estado-searching');
            titulo.textContent = '🔍 Buscando Especialista';
            msg.textContent = 'Activando red de profesionales en tu zona...';
        } else if (fase === 'ACEPTADA') {
            box.classList.add('estado-aceptada');
            titulo.textContent = '✅ Profesional Asignado';
            msg.textContent = 'Está en camino hacia tu ubicación';
            document.getElementById('infoWorker').classList.remove('hidden');
            iniciarMapa();
        } else if (fase === 'REALIZADA') {
            box.classList.add('estado-realizada');
            titulo.textContent = '🏁 Trabajo Completado';
            msg.textContent = 'El profesional marcó el trabajo como terminado';
            document.getElementById('btnConfirmarPago').classList.remove('hidden');
        }
    }

    function iniciarMapa() {
        document.getElementById('mapaWorker').classList.remove('hidden');
        if (mapa) return;
        mapa = L.map('mapaWorker').setView([-34.6, -58.4], 14);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '© OpenStreetMap'
        }).addTo(mapa);
    }

    function confirmarPago() {
        alert('Funcionalidad de pago próximamente. ¡Gracias por usar ServiRed!');
    }

    async function cargarMisPedidos() {
        try {
            const res = await fetch('/api/pedidos/mis-pedidos', {
                headers: { 'Authorization': 'Bearer ' + currentToken }
            });
            const data = await res.json();
            if (data.ok && data.pedidos.length) {
                const lista = document.getElementById('listaPedidos');
                lista.innerHTML = data.pedidos.map(p => `
                    <div class="pedido-card">
                        <strong>${p.tipoServicio}</strong> — ${p.zona}<br>
                        <span class="badge ${p.estado === 'ACEPTADA' ? 'online' : ''}">${p.estado}</span>
                        <small style="float:right;color:#64748b;">$${(p.total_estimado||0).toLocaleString('es-AR')}</small>
                    </div>
                `).join('');
                document.getElementById('misPedidosSection').classList.remove('hidden');
            }
        } catch(e) { console.error(e); }
    }

    // ── Socket events ────────────────────────────────────────
    socket.on('conectado_ok', () => {
        document.getElementById('loginSection').classList.add('hidden');
        document.getElementById('pedidoSection').classList.remove('hidden');
        cargarMisPedidos();
    });

    socket.on('trabajo_aceptado', (data) => {
        console.log('[Cliente] trabajo_aceptado:', data);
        document.getElementById('workerNombre').textContent = data.trabajadorNombre || 'Profesional asignado';
        mostrarEstado('ACEPTADA');
        cargarMisPedidos();
        if ('Notification' in window && Notification.permission === 'granted') {
            new Notification('¡Pedido Aceptado! 🎉', { body: data.mensaje });
        }
    });

    socket.on('estado_pedido', (data) => {
        console.log('[Cliente] estado_pedido:', data);
        if (data.estado === 'ACEPTADA') mostrarEstado('ACEPTADA');
        if (data.estado === 'REALIZADA') mostrarEstado('REALIZADA');
        cargarMisPedidos();
    });

    // GPS del worker en tiempo real
    socket.on('worker_gps', (data) => {
        console.log('[Cliente] GPS worker:', data.lat, data.lng);
        if (!mapa) iniciarMapa();
        const pos = [data.lat, data.lng];
        if (markerWorker) {
            markerWorker.setLatLng(pos);
        } else {
            markerWorker = L.marker(pos, {
                icon: L.divIcon({ html: '👷', className: '', iconSize: [30,30] })
            }).addTo(mapa).bindPopup('Profesional en camino');
        }
        mapa.setView(pos, 15);
    });

    if ('Notification' in window && Notification.permission === 'default') {
        Notification.requestPermission();
    }
</script>
</body>
</html>
