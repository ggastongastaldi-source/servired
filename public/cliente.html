<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SERVired — Cliente</title>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;600;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="/socket.io/socket.io.js"></script>
<style>
:root{--cyan:#00E5FF;--orange:#FF6D00;--green:#39ff14;--bg:#0a0e1a;--surface:#111827;--surface2:#1a2236;--text:#e2e8f0;--muted:#64748b;--success:#10b981;--danger:#ef4444;--warn:#f59e0b;}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);color:var(--text);font-family:'Rajdhani',sans-serif;min-height:100vh;}
.header{display:flex;align-items:center;justify-content:space-between;padding:14px 20px;background:#0d1b2a;border-bottom:1px solid rgba(0,229,255,0.15);position:sticky;top:0;z-index:100;}
.logo{font-size:1.5rem;font-weight:700;letter-spacing:2px;color:var(--cyan);text-shadow:0 0 12px rgba(0,229,255,0.5);}
.logo span{color:var(--orange);}
.btn-salir{background:rgba(239,68,68,0.15);border:1px solid #ef4444;color:#ef4444;padding:5px 12px;border-radius:6px;font-size:0.7rem;font-family:"Share Tech Mono",monospace;cursor:pointer;}
.btn-modo{background:rgba(0,229,255,0.15);border:1px solid var(--cyan);color:var(--cyan);padding:5px 12px;border-radius:6px;font-size:0.7rem;font-family:"Share Tech Mono",monospace;cursor:pointer;margin-right:6px;}
.user-pill{display:flex;align-items:center;gap:8px;background:var(--surface2);padding:6px 14px;border-radius:999px;font-size:0.85rem;border:1px solid rgba(0,229,255,0.2);}
.avatar{width:28px;height:28px;border-radius:50%;background:var(--orange);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:0.8rem;}
#mapa{width:100%;height:240px;}
.panel{padding:16px 20px;display:flex;flex-direction:column;gap:14px;padding-bottom:80px;}
.card{background:var(--surface);border:1px solid rgba(0,229,255,0.12);border-radius:14px;padding:16px;position:relative;overflow:hidden;}
.card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--cyan),var(--orange));}
.card-title{font-size:0.75rem;text-transform:uppercase;letter-spacing:2px;color:var(--muted);margin-bottom:12px;font-family:'Share Tech Mono',monospace;}
.servicios-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;}
.srv-btn{background:var(--surface2);border:1px solid rgba(255,255,255,0.08);border-radius:10px;padding:10px 6px;text-align:center;cursor:pointer;transition:all 0.2s;color:var(--text);}
.srv-btn:hover,.srv-btn.active{border-color:var(--cyan);background:rgba(0,229,255,0.08);color:var(--cyan);}
.srv-btn .icon{font-size:1.5rem;display:block;margin-bottom:3px;}
.srv-btn .label{font-size:0.7rem;font-weight:600;}
.dir-input{display:flex;align-items:center;gap:10px;background:var(--surface2);border:1px solid rgba(255,255,255,0.1);border-radius:10px;padding:12px 14px;}
.dir-input input{flex:1;background:none;border:none;outline:none;color:var(--text);font-family:'Rajdhani',sans-serif;font-size:1rem;}
.dir-input input::placeholder{color:var(--muted);}
.precio-row{display:flex;justify-content:space-between;align-items:center;}
.precio-valor{font-size:1.4rem;font-weight:700;color:var(--cyan);font-family:'Share Tech Mono',monospace;}
.btn-pedir{width:100%;padding:16px;background:linear-gradient(135deg,var(--orange),#ff8c00);border:none;border-radius:12px;color:#fff;font-family:'Rajdhani',sans-serif;font-size:1.2rem;font-weight:700;cursor:pointer;transition:all 0.2s;text-transform:uppercase;}
.btn-pedir:disabled{opacity:0.5;cursor:not-allowed;}
.worker-card{display:none;flex-direction:column;gap:12px;background:var(--surface);border:1px solid rgba(0,229,255,0.25);border-radius:14px;padding:16px;}
.worker-card.visible{display:flex;}
.worker-header{display:flex;align-items:center;gap:12px;}
.w-avatar{width:48px;height:48px;border-radius:50%;background:linear-gradient(135deg,var(--cyan),#0080ff);display:flex;align-items:center;justify-content:center;font-size:1.2rem;font-weight:700;color:#000;}
.eta-box{text-align:center;background:rgba(0,229,255,0.05);border-radius:10px;padding:10px;}
.eta-num{font-size:2rem;font-weight:700;color:var(--cyan);font-family:'Share Tech Mono',monospace;}
.eta-lbl{font-size:0.7rem;color:var(--muted);text-transform:uppercase;letter-spacing:1px;}
.btn-cancelar{width:100%;padding:12px;background:rgba(239,68,68,0.1);border:1px solid var(--danger);border-radius:10px;color:var(--danger);font-family:'Rajdhani',sans-serif;font-size:1rem;font-weight:600;cursor:pointer;}
.estado-bar{display:none;align-items:center;gap:10px;padding:10px 20px;background:var(--surface);border-bottom:1px solid rgba(255,255,255,0.05);}
.estado-bar.visible{display:flex;}
.pulse-dot{width:10px;height:10px;border-radius:50%;background:var(--cyan);animation:pulse 1.5s infinite;}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:0.5;transform:scale(1.4)}}
.estado-label{font-size:0.95rem;font-weight:600;color:var(--cyan);}
.nav-bottom{position:fixed;bottom:0;left:0;right:0;background:var(--surface);border-top:1px solid rgba(255,255,255,0.07);display:flex;z-index:50;}
.nav-btn{flex:1;padding:12px 0;display:flex;flex-direction:column;align-items:center;gap:3px;background:none;border:none;color:var(--muted);cursor:pointer;font-family:'Rajdhani',sans-serif;}
.nav-btn.active{color:var(--cyan);}
.nav-btn .ni{font-size:1.4rem;}
.nav-btn .nl{font-size:0.65rem;text-transform:uppercase;letter-spacing:1px;}
.pantalla{display:none;padding-bottom:70px;}
.pantalla.active{display:block;}
.toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%) translateY(100px);background:var(--surface);border:1px solid var(--cyan);border-radius:10px;padding:12px 20px;font-size:0.9rem;z-index:200;transition:transform 0.3s;white-space:nowrap;}
.toast.show{transform:translateX(-50%) translateY(0);}
.hist-item{display:flex;justify-content:space-between;align-items:center;padding:12px;background:var(--surface2);border-radius:10px;margin-bottom:8px;}
.badge{padding:3px 10px;border-radius:999px;font-size:0.7rem;font-weight:700;text-transform:uppercase;font-family:'Share Tech Mono',monospace;}
.badge.PAGADA{background:rgba(16,185,129,0.15);color:var(--success);border:1px solid var(--success);}
.badge.PENDIENTE{background:rgba(245,158,11,0.15);color:var(--warn);border:1px solid var(--warn);}
.badge.CANCELADA{background:rgba(239,68,68,0.15);color:var(--danger);border:1px solid var(--danger);}
</style>
</head>
<body>
<div class="header">
  <div class="logo">SERV<span>ired</span></div>
  <div style="display:flex;align-items:center;gap:6px;">
  <button class="btn-modo" onclick="window.location='/trabajador.html'">🔧 Ir como Trabajador</button>
  <button class="btn-salir" onclick="logout()">⏻ Salir</button>
</div>
<div class="user-pill"><div class="avatar" id="av">C</div><span id="nombre-cliente">Cliente</span></div>
</div>
<div class="estado-bar" id="estado-bar">
  <div class="pulse-dot"></div>
  <div class="estado-label" id="estado-txt">Buscando trabajador...</div>
</div>
<div class="pantalla active" id="pant-pedir">
  <div id="mapa"></div>
  <div class="panel">
    <div class="card">
      <div class="card-title">// ¿Qué servicio necesitás?</div>
      <div class="servicios-grid" id="servicios-grid"></div>
    </div>
    <div class="card">
      <div class="card-title">// Tu dirección</div>
      <div class="dir-input"><span style="color:var(--orange)">📍</span><input type="text" id="dir-input" placeholder="Av. Corrientes 1234, CABA"></div>
    </div>
    <div class="card">
      <div class="card-title">// Precio estimado · Motor Aladín</div>
      <div class="precio-row"><span style="color:var(--muted)">Base estimada</span><span class="precio-valor" id="precio-display">$ —</span></div>
    </div>
    <button class="btn-pedir" id="btn-pedir" onclick="pedirServicio()">⚡ PEDIR AHORA</button>
    <div class="worker-card" id="worker-card">
      <div class="worker-header">
        <div class="w-avatar" id="w-ini">T</div>
        <div><div style="font-size:1.1rem;font-weight:700" id="w-nombre">—</div><div style="color:var(--muted);font-size:0.8rem">★★★★☆ Verificado · SERVired</div></div>
      </div>
      <div class="eta-box"><div class="eta-num" id="eta-num">—</div><div class="eta-lbl">minutos estimados de llegada</div></div>
      <button class="btn-cancelar" onclick="cancelarPedido()">✕ Cancelar pedido</button>
    </div>
  </div>
</div>
<div class="pantalla" id="pant-historial">
  <div class="panel">
    <div class="card">
      <div class="card-title">// Mis pedidos</div>
      <div id="lista-hist"><div style="color:var(--muted);text-align:center;padding:20px">Cargando...</div></div>
    </div>
  </div>
</div>
<nav class="nav-bottom">
  <button class="nav-btn active" onclick="irPant('pedir',this)"><span class="ni">🏠</span><span class="nl">Inicio</span></button>
  <button class="nav-btn" onclick="irPant('historial',this);cargarHistorial()"><span class="ni">📋</span><span class="nl">Pedidos</span></button>
  <button class="nav-btn" onclick="cerrarSesion()"><span class="ni">🚪</span><span class="nl">Salir</span></button>
</nav>
<div class="toast" id="toast"></div>

<script>
const RUBROS=[
  {id:'servicio_domestico',label:'Doméstico',icon:'🧹',precio:8000},
  {id:'plomeria',label:'Plomería',icon:'🔧',precio:12000},
  {id:'electricidad',label:'Electricidad',icon:'⚡',precio:14000},
  {id:'pintura',label:'Pintura',icon:'🎨',precio:10000},
  {id:'jardineria',label:'Jardín',icon:'🌿',precio:9000},
  {id:'mudanza',label:'Mudanza',icon:'📦',precio:18000},
  {id:'gasista',label:'Gasista',icon:'🔥',precio:13000},
  {id:'carpintero',label:'Carpintería',icon:'🪚',precio:11000},
  {id:'cerrajero',label:'Cerrajería',icon:'🔑',precio:9500},
  {id:'albanil',label:'Albañilería',icon:'🧱',precio:15000},
  {id:'techista',label:'Techista',icon:'🏚️',precio:16000},
  {id:'herrero',label:'Herrería',icon:'⚒️',precio:12000},
  {id:'mecanico',label:'Mecánico',icon:'🔩',precio:14000},
  {id:'refrigeracion',label:'Refrigeración',icon:'❄️',precio:15000},
  {id:'informatico',label:'Informático',icon:'💻',precio:10000},
  {id:'yesero',label:'Yesero',icon:'🪣',precio:11000},
  {id:'cuidador',label:'Cuidador/a',icon:'🧑‍⚕️',precio:9000},
  {id:'enfermero',label:'Enfermero/a',icon:'💊',precio:12000},
  {id:'instructor',label:'Instructor',icon:'🏋️',precio:10000},
  {id:'fotografo',label:'Fotógrafo',icon:'📷',precio:11000},
  {id:'chofer',label:'Chofer',icon:'🚗',precio:9000},
  {id:'cocinero',label:'Cocinero/a',icon:'👨‍🍳',precio:10000},
  {id:'delivery',label:'Delivery',icon:'🛵',precio:6000},
  {id:'seguridad',label:'Seguridad',icon:'🛡️',precio:13000},
  {id:'peluquero',label:'Peluquero/a',icon:'✂️',precio:8000},
  {id:'masajista',label:'Masajista',icon:'💆',precio:10000},
];

// Construir grilla
let servicioSel=RUBROS[0].id,precioSel=RUBROS[0].precio;
const grid=document.getElementById('servicios-grid');
RUBROS.forEach((r,i)=>{
  const b=document.createElement('div');
  b.className='srv-btn'+(i===0?' active':'');
  b.dataset.tipo=r.id;b.dataset.precio=r.precio;
  b.innerHTML=`<span class="icon">${r.icon}</span><span class="label">${r.label}</span>`;
  b.onclick=()=>selSrv(b,r);
  grid.appendChild(b);
});
document.getElementById('precio-display').textContent='$ '+RUBROS[0].precio.toLocaleString('es-AR');

function selSrv(btn,r){
  document.querySelectorAll('.srv-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  servicioSel=r.id;precioSel=r.precio;
  document.getElementById('precio-display').textContent='$ '+r.precio.toLocaleString('es-AR');
}

function logout(){localStorage.removeItem('token');window.location='/';}
let TOKEN,payload,socket,mapa,markerCli,markerTrab,pedidoActivo=null;

window.addEventListener('load',function(){
  TOKEN=localStorage.getItem('token');
  if(!TOKEN){window.location='/';return;}
  try{payload=JSON.parse(atob(TOKEN.split('.')[1]));}
  catch(e){localStorage.removeItem('token');window.location='/';return;}
  if(payload.exp<Date.now()/1000){localStorage.removeItem('token');window.location='/';return;}
  try{document.getElementById('nombre-cliente').textContent=payload.nombre||'Cliente';}catch(ex){}
  try{document.getElementById('av').textContent=(payload.nombre||'C')[0].toUpperCase();}catch(ex){}
  try{socket=io();}catch(ex){console.error('Socket:',ex);}
  initMapa();
});

function initMapa(){
  mapa=L.map('mapa',{zoomControl:false}).setView([-34.6037,-58.3816],13);
  L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png',{maxZoom:19}).addTo(mapa);
  const ic=L.divIcon({html:'<div style="background:#FF6D00;width:14px;height:14px;border-radius:50%;border:2px solid #fff;box-shadow:0 0 8px rgba(255,109,0,0.8)"></div>',className:'',iconSize:[14,14]});
  markerCli=L.marker([-34.6037,-58.3816],{icon:ic}).addTo(mapa).bindPopup('Tu ubicación');
  if(navigator.geolocation)navigator.geolocation.getCurrentPosition(p=>{markerCli.setLatLng([p.coords.latitude,p.coords.longitude]);mapa.setView([p.coords.latitude,p.coords.longitude],14);});
}

function pedirServicio(){
  const dir=document.getElementById('dir-input').value.trim();
  if(!dir){toast('📍 Ingresá tu dirección');return;}
  const btn=document.getElementById('btn-pedir');
  btn.disabled=true;btn.textContent='⏳ Buscando trabajador...';
  document.getElementById('estado-bar').classList.add('visible');
  document.getElementById('estado-txt').textContent='Buscando trabajador disponible...';
  socket.emit('nuevo_pedido',{token:TOKEN,servicio:servicioSel,direccion:dir,precio:precioSel});
}

function cancelarPedido(){
  if(pedidoActivo)socket.emit('cancelar_pedido',{pedidoId:pedidoActivo,token:TOKEN});
  resetUI();
}

function resetUI(){
  const btn=document.getElementById('btn-pedir');
  btn.disabled=false;btn.textContent='⚡ PEDIR AHORA';
  document.getElementById('estado-bar').classList.remove('visible');
  document.getElementById('worker-card').classList.remove('visible');
  if(markerTrab){mapa.removeLayer(markerTrab);markerTrab=null;}
  pedidoActivo=null;
}

function cerrarSesion(){localStorage.removeItem('token');window.location='/';}

socket.on('pedido_aceptado',data=>{
  pedidoActivo=data.pedidoId;
  document.getElementById('estado-txt').textContent='✅ Trabajador en camino';
  document.getElementById('w-nombre').textContent=data.trabajador.nombre;
  document.getElementById('w-ini').textContent=data.trabajador.nombre[0];
  document.getElementById('eta-num').textContent=data.eta||'~15';
  document.getElementById('worker-card').classList.add('visible');
  const ic=L.divIcon({html:'<div style="background:#00E5FF;width:14px;height:14px;border-radius:50%;border:2px solid #fff;box-shadow:0 0 10px rgba(0,229,255,0.9)"></div>',className:'',iconSize:[14,14]});
  if(markerTrab)mapa.removeLayer(markerTrab);
  markerTrab=L.marker([data.trabajador.lat||(-34.6037),data.trabajador.lng||(-58.3816)],{icon:ic}).addTo(mapa);
  toast('¡Trabajador asignado! Viene en camino 🚀');
});
socket.on('ubicacion_trabajador',data=>{if(markerTrab)markerTrab.setLatLng([data.lat,data.lng]);});
socket.on('estado_pedido_actualizado',data=>{document.getElementById('estado-txt').textContent='Estado: '+data.estado.replace(/_/g,' ');});
socket.on('pedido_completado',()=>{toast('✅ Servicio completado. ¡Gracias!');resetUI();cargarHistorial();irPant('historial',null);});
socket.on('pedido_cancelado',()=>{toast('Pedido cancelado');resetUI();});

async function cargarHistorial(){
  try{
    const r=await fetch('/api/pedidos/mis-pedidos',{headers:{Authorization:'Bearer '+TOKEN}});
    const data=await r.json();
    const lista=document.getElementById('lista-hist');
    const rmap=Object.fromEntries(RUBROS.map(x=>[x.id,x]));
    if(!data.length){lista.innerHTML='<div style="color:var(--muted);text-align:center;padding:20px">Sin pedidos aún</div>';return;}
    lista.innerHTML=data.map(p=>{const robj=rmap[p.tipoServicio]||{};return`<div class="hist-item"><div><div style="font-weight:600">${robj.icon||'🔨'} ${(p.tipoServicio||'—').replace(/_/g,' ')}</div><div style="font-size:0.75rem;color:var(--muted)">${new Date(p.createdAt).toLocaleDateString('es-AR')} · $${(p.precio||0).toLocaleString('es-AR')}</div></div><span class="badge ${p.estado}">${p.estado}</span></div>`;}).join('');
  }catch(e){}
}

function irPant(id,btn){
  document.querySelectorAll('.pantalla').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('pant-'+id)?.classList.add('active');
  if(btn)btn.classList.add('active');
  if(id==='mapa')setTimeout(()=>mapa?.invalidateSize(),100);
}

function toast(msg,dur=3500){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),dur);}

window.addEventListener('DOMContentLoaded',initMapa);
</script>
</body>
</html>
