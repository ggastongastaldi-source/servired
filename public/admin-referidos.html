<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Panel de Referidos — ServiRed</title>
<style>
  :root{
    --bg:#0a0e17; --card:#111927; --border:rgba(255,255,255,0.08);
    --cyan:#00E5FF; --orange:#FF6B35; --green:#39FF88; --text:#e8edf5; --muted:#8b96a8;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{
    background:var(--bg); color:var(--text);
    font-family:'Segoe UI',system-ui,sans-serif;
    padding:20px 16px 60px; min-height:100vh;
  }
  .header{ text-align:center; margin-bottom:24px; }
  .header h1{
    font-size:22px; font-weight:800; letter-spacing:1px;
    background:linear-gradient(90deg,var(--cyan),var(--orange));
    -webkit-background-clip:text; background-clip:text; color:transparent;
  }
  .header p{ color:var(--muted); font-size:13px; margin-top:4px; }

  .totals{
    display:grid; grid-template-columns:repeat(4,1fr); gap:8px;
    max-width:680px; margin:20px auto 28px;
  }
  .total-box{
    background:var(--card); border:1px solid var(--border); border-radius:12px;
    padding:12px 8px; text-align:center;
  }
  .total-box .val{ font-size:20px; font-weight:800; color:var(--cyan); }
  .total-box .lbl{ font-size:11px; color:var(--muted); margin-top:2px; }

  .cards{ max-width:680px; margin:0 auto; display:flex; flex-direction:column; gap:14px; }
  .card{
    background:var(--card); border:1px solid var(--border); border-radius:16px;
    padding:18px; position:relative; overflow:hidden;
  }
  .card::before{
    content:''; position:absolute; top:0; left:0; right:0; height:3px;
    background:linear-gradient(90deg,var(--cyan),var(--orange));
  }
  .card-head{ display:flex; justify-content:space-between; align-items:flex-start; gap:10px; margin-bottom:14px; }
  .card-head h2{ font-size:16px; font-weight:700; }
  .card-head .zona{ font-size:12px; color:var(--orange); margin-top:2px; }
  .badge{
    font-size:11px; font-family:monospace; background:rgba(0,229,255,0.1);
    color:var(--cyan); border:1px solid rgba(0,229,255,0.3);
    padding:3px 8px; border-radius:6px; white-space:nowrap;
  }
  .funnel{ display:flex; flex-direction:column; gap:8px; }
  .funnel-row{ display:flex; align-items:center; gap:10px; }
  .funnel-label{ font-size:12px; color:var(--muted); width:84px; flex-shrink:0; }
  .funnel-bar-bg{ flex:1; background:rgba(255,255,255,0.06); border-radius:8px; height:18px; overflow:hidden; }
  .funnel-bar{ height:100%; border-radius:8px; transition:width .4s ease; display:flex; align-items:center; justify-content:flex-end; padding-right:6px; }
  .funnel-bar.scans{ background:linear-gradient(90deg,#0099aa,var(--cyan)); }
  .funnel-bar.registros{ background:linear-gradient(90deg,#cc8800,var(--orange)); }
  .funnel-bar.clientes{ background:linear-gradient(90deg,#1565c0,#42a5f5); }
  .funnel-bar.workers{ background:linear-gradient(90deg,#2e7d32,var(--green)); }
  .funnel-val{ font-size:11px; font-weight:700; color:#0a0e17; }
  .footer-stats{
    display:flex; gap:14px; margin-top:14px; padding-top:12px;
    border-top:1px solid var(--border); font-size:12px; color:var(--muted);
  }
  .footer-stats b{ color:var(--text); }
  .empty, .loading, .error{ text-align:center; color:var(--muted); padding:40px 20px; }
  .error{ color:var(--orange); }
  .error a{ color:var(--cyan); text-decoration:underline; }
  .refresh{
    display:block; margin:24px auto 0; background:transparent;
    border:1px solid var(--cyan); color:var(--cyan); font-weight:700;
    padding:10px 24px; border-radius:10px; font-size:13px; cursor:pointer;
  }
  .nc-input{
    width:100%; padding:10px 12px; border-radius:8px; border:1px solid var(--border);
    background:#0d1420; color:var(--text); font-size:13px; font-family:inherit;
  }
  .qr-box{ background:#fff; border-radius:8px; padding:6px; display:inline-block; line-height:0; }
</style>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
</head>
<body>

<div class="header">
  <h1>📊 PANEL DE REFERIDOS</h1>
  <p>ServiRed — Atribución territorial por comercio</p>
</div>

<div class="card" style="max-width:680px;margin:0 auto 20px;">
  <div class="card-head"><h2>➕ Nuevo comercio</h2></div>
  <div style="display:flex;flex-direction:column;gap:8px;">
    <input id="nc-nombre" placeholder="Nombre del comercio" class="nc-input">
    <input id="nc-zona" placeholder="Zona / Localidad" class="nc-input">
    <select id="nc-tipo" class="nc-input">
      <option value="ferreteria">Ferretería</option>
      <option value="corralon">Corralón</option>
      <option value="pintureria">Pintureria</option>
      <option value="otro" selected>Otro</option>
    </select>
    <button class="refresh" style="margin:0;" onclick="crearComercio()">Crear y generar QR</button>
  </div>
  <div id="nc-msg" style="font-size:12px;margin-top:8px;color:var(--muted);"></div>
</div>

<div id="totals" class="totals"></div>
<div id="content" class="cards"><div class="loading">Cargando…</div></div>
<button class="refresh" onclick="cargar()">🔄 Actualizar</button>

<script>
function getToken(){ return localStorage.getItem('servired_token') || localStorage.getItem('token'); }

function pct(n, total){
  if(!total) return 0;
  return Math.min(100, Math.round((n/total)*100));
}

function card(r){
  const s = r.stats || {};
  const scans = s.scans || 0, registros = s.registros || 0;
  const clientes = s.clientes || 0, workers = s.workers || 0;
  const conv = pct(registros, scans);

  return `
  <div class="card">
    <div class="card-head">
      <div>
        <h2>${r.nombre}</h2>
        <div class="zona">📍 ${r.zona}</div>
      </div>
      <span class="badge">${r.ref_code}</span>
    </div>
    <div style="display:flex;align-items:center;gap:12px;margin-bottom:14px;">
      <div class="qr-box" id="qr-${r._id}"></div>
      <div style="font-size:11px;color:var(--muted);word-break:break-all;">servired.online/r/${r.ref_code}</div>
    </div>
    <div class="funnel">
      <div class="funnel-row">
        <div class="funnel-label">Scans</div>
        <div class="funnel-bar-bg"><div class="funnel-bar scans" style="width:100%"><span class="funnel-val">${scans}</span></div></div>
      </div>
      <div class="funnel-row">
        <div class="funnel-label">Registros</div>
        <div class="funnel-bar-bg"><div class="funnel-bar registros" style="width:${Math.max(pct(registros,scans),registros?6:0)}%"><span class="funnel-val">${registros}</span></div></div>
      </div>
      <div class="funnel-row">
        <div class="funnel-label">Clientes</div>
        <div class="funnel-bar-bg"><div class="funnel-bar clientes" style="width:${Math.max(pct(clientes,scans),clientes?6:0)}%"><span class="funnel-val">${clientes}</span></div></div>
      </div>
      <div class="funnel-row">
        <div class="funnel-label">Trabajadores</div>
        <div class="funnel-bar-bg"><div class="funnel-bar workers" style="width:${Math.max(pct(workers,scans),workers?6:0)}%"><span class="funnel-val">${workers}</span></div></div>
      </div>
    </div>
    <div class="footer-stats">
      <span>Conversión scan→registro: <b>${conv}%</b></span>
      <span>Tipo: <b>${r.tipo}</b></span>
      <span>Estado: <b>${r.activo ? 'Activo' : 'Inactivo'}</b></span>
    </div>
  </div>`;
}

async function cargar(){
  const content = document.getElementById('content');
  const totalsEl = document.getElementById('totals');
  content.innerHTML = '<div class="loading">Cargando…</div>';

  const TOKEN = getToken();
  if(!TOKEN){
    content.innerHTML = '<div class="error">No hay sesión. <a href="/">Iniciá sesión como Admin</a> primero.</div>';
    totalsEl.innerHTML = '';
    return;
  }

  try{
    const r = await fetch('/api/admin/referidos', { headers: { 'Authorization': 'Bearer ' + TOKEN } });
    if(r.status === 401 || r.status === 403){
      content.innerHTML = '<div class="error">Sesión sin permisos de Admin. <a href="/">Volver e iniciar sesión</a>.</div>';
      totalsEl.innerHTML = '';
      return;
    }
    const data = await r.json();
    const list = data.data || [];

    if(!list.length){
      content.innerHTML = '<div class="empty">Todavía no hay comercios referentes registrados.</div>';
      totalsEl.innerHTML = '';
      return;
    }

    const tot = list.reduce((acc, r) => {
      const s = r.stats || {};
      acc.scans += s.scans||0; acc.registros += s.registros||0;
      acc.clientes += s.clientes||0; acc.workers += s.workers||0;
      return acc;
    }, {scans:0,registros:0,clientes:0,workers:0});

    totalsEl.innerHTML = `
      <div class="total-box"><div class="val">${tot.scans}</div><div class="lbl">Scans</div></div>
      <div class="total-box"><div class="val">${tot.registros}</div><div class="lbl">Registros</div></div>
      <div class="total-box"><div class="val">${tot.clientes}</div><div class="lbl">Clientes</div></div>
      <div class="total-box"><div class="val">${tot.workers}</div><div class="lbl">Trabajadores</div></div>
    `;

    content.innerHTML = list.map(card).join('');

    list.forEach(function(r){
      var el = document.getElementById('qr-'+r._id);
      if(el) new QRCode(el, { text: 'https://www.servired.online/r/'+r.ref_code, width:88, height:88, colorDark:'#0a0e17', colorLight:'#ffffff' });
    });
  }catch(e){
    content.innerHTML = '<div class="error">Error al cargar: ' + e.message + '</div>';
  }
}

async function crearComercio(){
  var TOKEN = getToken();
  var nombre = document.getElementById('nc-nombre').value.trim();
  var zona = document.getElementById('nc-zona').value.trim();
  var tipo = document.getElementById('nc-tipo').value;
  var msg = document.getElementById('nc-msg');

  if(!nombre || !zona){ msg.textContent = 'Nombre y zona son obligatorios.'; return; }
  if(!TOKEN){ msg.textContent = 'No hay sesion.'; return; }

  msg.textContent = 'Creando...';
  try{
    var r = await fetch('/api/admin/referidos', {
      method:'POST',
      headers:{ 'Content-Type':'application/json', 'Authorization':'Bearer ' + TOKEN },
      body: JSON.stringify({ nombre: nombre, zona: zona, tipo: tipo })
    });
    var data = await r.json();
    if(!data.ok){ msg.textContent = 'Error: ' + (data.error||'desconocido'); return; }

    msg.textContent = '✅ Creado: ' + data.data.ref_code;
    document.getElementById('nc-nombre').value = '';
    document.getElementById('nc-zona').value = '';
    cargar();
  }catch(e){
    msg.textContent = 'Error: ' + e.message;
  }
}

cargar();
</script>
</body>
</html>
