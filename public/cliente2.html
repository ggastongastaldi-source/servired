<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SERVired - Cliente</title>
<style>
body{background:#0a0e1a;color:#00E5FF;font-family:sans-serif;padding:20px;}
.btn{background:#00E5FF;color:#000;padding:12px 20px;border:none;border-radius:8px;font-size:1rem;cursor:pointer;margin:8px;}
</style>
</head>
<body>
<h2>✅ Panel Cliente</h2>
<div id="nombre">Cargando...</div>
<br>
<button class="btn" onclick="window.location='/trabajador.html'">🔧 Ir como Trabajador</button>
<button class="btn" onclick="logout()">⏻ Salir</button>
<script>
function logout(){localStorage.removeItem('token');window.location='/';}
window.addEventListener('load', function(){
  const t = localStorage.getItem('token');
  if(!t){window.location='/';return;}
  try{
    const p = JSON.parse(atob(t.split('.')[1]));
    document.getElementById('nombre').textContent = '👋 Hola, ' + (p.nombre||'Cliente');
  }catch(e){window.location='/';}
});
</script>
</body>
</html>
