<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Worker - ServiRed</title>
    <script src="/socket.io/socket.io.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0f172a; 
            color: #e2e8f0;
            min-height: 100vh;
        }
        .container { max-width: 480px; margin: 0 auto; padding: 20px; }
        .header { text-align: center; padding: 20px 0; border-bottom: 1px solid #334155; }
        .header h1 { color: #f59e0b; font-size: 1.5rem; }
        .status { 
            display: inline-flex; 
            align-items: center; 
            gap: 8px;
            padding: 8px 16px;
            background: #1e293b;
            border-radius: 20px;
            margin-top: 10px;
            font-size: 0.9rem;
        }
        .status.online { color: #22c55e; }
        .status.offline { color: #ef4444; }
        .dot { width: 8px; height: 8px; border-radius: 50%; background: currentColor; }
        
        .section { 
            background: #1e293b; 
            border-radius: 12px; 
            padding: 16px; 
            margin: 16px 0;
            border: 1px solid #334155;
        }
        .section h3 { color: #94a3b8; font-size: 0.8rem; text-transform: uppercase; margin-bottom: 12px; }
        
        .btn { 
            width: 100%; 
            padding: 14px; 
            border: none; 
            border-radius: 8px; 
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }
        .btn-primary { background: #f59e0b; color: #0f172a; }
        .btn-primary:hover { background: #d97706; }
        .btn-success { background: #22c55e; color: white; }
        .btn-danger { background: #ef4444; color: white; }
        
        .oportunidad { 
            background: linear-gradient(135deg, #f59e0b 0%, #d97706 100%);
            color: #0f172a;
            padding: 20px;
            border-radius: 12px;
            margin: 12px 0;
            animation: slideIn 0.3s ease;
        }
        @keyframes slideIn {
            from { transform: translateX(-100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }
        .oportunidad h4 { font-size: 1.1rem; margin-bottom: 8px; }
        .oportunidad .precio { font-size: 1.5rem; font-weight: bold; margin: 8px 0; }
        .oportunidad .zona { opacity: 0.9; font-size: 0.9rem; }
        
        .log { 
            background: #0f172a; 
            padding: 12px; 
            border-radius: 8px; 
            font-family: monospace; 
            font-size: 0.8rem;
            max-height: 200px;
            overflow-y: auto;
        }
        .log-entry { margin: 4px 0; padding: 4px 0; border-bottom: 1px solid #1e293b; }
        .log-entry.error { color: #ef4444; }
        .log-entry.success { color: #22c55e; }
        .log-entry.info { color: #3b82f6; }
        
        .hidden { display: none !important; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🔧 ServiRed Worker</h1>
            <div class="status offline" id="statusIndicator">
                <span class="dot"></span>
                <span id="statusText">Desconectado</span>
            </div>
        </div>

        <!-- Login Section -->
        <div class="section" id="loginSection">
            <h3>🔐 Ingresar</h3>
            <input type="text" id="tokenInput" placeholder="Pega tu token JWT aquí..." 
                   style="width:100%;padding:12px;border-radius:8px;border:1px solid #334155;background:#0f172a;color:#e2e8f0;margin-bottom:12px;">
            <select id="rubroInput" style="width:100%;padding:12px;border-radius:8px;border:1px solid #334155;background:#0f172a;color:#e2e8f0;margin-bottom:12px;">
                <option value="">Selecciona tu especialidad...</option>
                <option value="plomeria">🚿 Plomería</option>
                <option value="electricidad">⚡ Electricidad</option>
                <option value="gasista">🔥 Gasista</option>
                <option value="cerrajeria">🔑 Cerrajería</option>
                <option value="domestica">🧹 Servicio Doméstico</option>
                <option value="pintura">🎨 Pintura</option>
                <option value="albanileria">🧱 Albañilería</option>
                <option value="camaras">📷 Cámaras de Seguridad</option>
                <option value="alarmas">🚨 Alarmas</option>
                <option value="aire_acondicionado">❄️ Aire Acondicionado</option>
            </select>
            <button class="btn btn-primary" onclick="conectar()">Conectar</button>
        </div>

        <!-- Dashboard -->
        <div class="section hidden" id="dashboardSection">
            <h3>📊 Estado</h3>
            <button class="btn btn-success" onclick="toggleDisponible(true)">🟢 Estoy Disponible</button>
            <button class="btn btn-danger" onclick="toggleDisponible(false)" style="margin-top:8px;">🔴 Estoy Ocupado</button>
        </div>

        <!-- Oportunidades -->
        <div class="section hidden" id="oportunidadesSection">
            <h3>🔔 Oportunidades de Trabajo</h3>
            <div id="oportunidadesList">
                <p style="color:#64748b;text-align:center;padding:20px;">Esperando oportunidades...</p>
            </div>
        </div>

        <!-- Log -->
        <div class="section">
            <h3>📋 Log de Eventos</h3>
            <div class="log" id="eventLog"></div>
            <button class="btn" onclick="limpiarLog()" style="margin-top:8px;background:#334155;">Limpiar</button>
        </div>
    </div>

    <script>
        const socket = io();
        let currentToken = '';
        let currentRubro = '';

        function log(msg, type = 'info') {
            const logDiv = document.getElementById('eventLog');
            const entry = document.createElement('div');
            entry.className = `log-entry ${type}`;
            entry.textContent = `[${new Date().toLocaleTimeString()}] ${msg}`;
            logDiv.insertBefore(entry, logDiv.firstChild);
        }

        function conectar() {
            currentToken = document.getElementById('tokenInput').value.trim();
            currentRubro = document.getElementById('rubroInput').value;
            
            if (!currentToken) {
                alert('Token requerido');
                return;
            }
            if (!currentRubro) {
                alert('Selecciona tu especialidad');
                return;
            }

            log('Conectando...', 'info');
            
            socket.emit('worker_conectado', {
                token: currentToken,
                rubro: currentRubro,
                lat: -34.6,
                lng: -58.4
            });
        }

        function toggleDisponible(disponible) {
            socket.emit('cambiar_estado', {
                token: currentToken,
                disponible: disponible
            });
            log(`Estado cambiado a: ${disponible ? 'DISPONIBLE' : 'OCUPADO'}`, 'success');
        }

        function aceptarTrabajo(pedidoId) {
            socket.emit('aceptar_trabajo', {
                pedidoId: pedidoId,
                token: currentToken
            });
            log(`Solicitando trabajo ${pedidoId}...`, 'info');
        }

        function limpiarLog() {
            document.getElementById('eventLog').innerHTML = '';
        }

        // Socket Events
        socket.on('connect', () => {
            log('Socket conectado al servidor', 'success');
        });

        socket.on('conectado_ok', (data) => {
            log(`Worker autenticado: ${data.socketId}`, 'success');
            document.getElementById('statusIndicator').className = 'status online';
            document.getElementById('statusText').textContent = 'Conectado - ' + currentRubro;
            document.getElementById('loginSection').classList.add('hidden');
            document.getElementById('dashboardSection').classList.remove('hidden');
            document.getElementById('oportunidadesSection').classList.remove('hidden');
        });

        socket.on('nueva_oportunidad', (data) => {
            log(`Nueva oportunidad: ${data.rubro} en ${data.zona} - $${data.precio}`, 'success');
            
            const list = document.getElementById('oportunidadesList');
            const div = document.createElement('div');
            div.className = 'oportunidad';
            div.innerHTML = `
                <h4>🛠️ ${data.rubro.toUpperCase()}</h4>
                <div class="zona">📍 ${data.zona}</div>
                <div class="precio">$${(data.precio || 0).toLocaleString('es-AR')}</div>
                <p style="margin:8px 0;font-size:0.9rem;">${data.descripcion || 'Sin descripción'}</p>
                <button class="btn btn-success" onclick="aceptarTrabajo('${data.pedidoId}')">ACEPTAR TRABAJO</button>
            `;
            list.insertBefore(div, list.firstChild);
            
            // Sonido de notificación
            if ('Notification' in window && Notification.permission === 'granted') {
                new Notification('Nuevo trabajo disponible!', {
                    body: `${data.rubro} en ${data.zona} - $${data.precio}`
                });
            }
        });

        socket.on('trabajo_aceptado_ok', (data) => {
            log('¡TRABAJO ACEPTADO! ' + data.mensaje, 'success');
            alert('¡Felicitaciones! Asignaste el trabajo.');
        });

        socket.on('trabajo_aceptado_error', (data) => {
            log('Error al aceptar: ' + data.error, 'error');
            alert('Error: ' + data.error);
        });

        socket.on('pedido_tomado', (data) => {
            log('Pedido tomado por otro: ' + data.mensaje, 'info');
        });

        socket.on('error_auth', (data) => {
            log('Error auth: ' + data.mensaje, 'error');
            alert('Error de autenticación: ' + data.mensaje);
        });

        socket.on('disconnect', () => {
            log('Desconectado del servidor', 'error');
            document.getElementById('statusIndicator').className = 'status offline';
            document.getElementById('statusText').textContent = 'Desconectado';
        });

        // Solicitar permiso de notificaciones
        if ('Notification' in window && Notification.permission === 'default') {
            Notification.requestPermission();
        }
    </script>
</body>
</html>
