<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Worker - ServiRed</title>
    <script src="/socket.io/socket.io.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #0f172a; color: #e2e8f0; min-height: 100vh; }
        .container { max-width: 480px; margin: 0 auto; padding: 20px; }
        .header { text-align: center; padding: 20px 0; border-bottom: 1px solid #334155; }
        .header h1 { color: #f59e0b; font-size: 1.5rem; }
        .status { display: inline-flex; align-items: center; gap: 8px; padding: 8px 16px; background: #1e293b; border-radius: 20px; margin-top: 10px; font-size: 0.9rem; }
        .status.online { color: #22c55e; }
        .status.offline { color: #ef4444; }
        .dot { width: 8px; height: 8px; border-radius: 50%; background: currentColor; }
        .section { background: #1e293b; border-radius: 12px; padding: 16px; margin: 16px 0; border: 1px solid #334155; }
        .section h3 { color: #94a3b8; font-size: 0.8rem; text-transform: uppercase; margin-bottom: 12px; }
        .btn { width: 100%; padding: 14px; border: none; border-radius: 8px; font-size: 1rem; font-weight: 600; cursor: pointer; transition: all 0.2s; margin-top: 8px; }
        .btn-primary { background: #f59e0b; color: #0f172a; }
        .btn-success { background: #22c55e; color: white; }
        .btn-danger { background: #ef4444; color: white; }
        .btn-purple { background: #6366f1; color: white; }
        .oportunidad { background: linear-gradient(135deg, #f59e0b 0%, #d97706 100%); color: #0f172a; padding: 20px; border-radius: 12px; margin: 12px 0; animation: slideIn 0.3s ease; }
        @keyframes slideIn { from{transform:translateX(-100%);opacity:0} to{transform:translateX(0);opacity:1} }
        .oportunidad h4 { font-size: 1.1rem; margin-bottom: 8px; }
        .oportunidad .precio { font-size: 1.5rem; font-weight: bold; margin: 8px 0; }
        .trabajo-activo { background: linear-gradient(135deg, #14532d, #166534); border: 2px solid #22c55e; padding: 20px; border-radius: 12px; margin: 12px 0; }
        .log { background: #0f172a; padding: 12px; border-radius: 8px; font-family: monospace; font-size: 0.8rem; max-height: 200px; overflow-y: auto; }
        .log-entry { margin: 4px 0; padding: 4px 0; border-bottom: 1px solid #1e293b; }
        .log-entry.error { color: #ef4444; }
        .log-entry.success { color: #22c55e; }
        .log-entry.info { color: #3b82f6; }
        .gps-indicator { display: inline-flex; align-items: center; gap: 6px; font-size: 0.8rem; color: #22c55e; margin-top: 8px; }
        .gps-dot { width: 8px; height: 8px; border-radius: 50%; background: #22c55e; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }
        input, select { width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #334155; background: #0f172a; color: #e2e8f0; margin-bottom: 12px; }
        .hidden { display: none !important; }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1>🔧 ServiRed Worker</h1>
        <div class="status offline" id="statusIndicator">
            <span class="dot"></span>
            <span id="statusText">Desconectado</span>
        </div>
    </div>

    <!-- Login -->
    <div class="section" id="loginSection">
        <h3>Ingresar</h3>
        <input type="text" id="tokenInput" placeholder="Token JWT...">
        <select id="rubroInput">
            <option value="">Seleccioná tu especialidad...</option>
            <option value="plomeria">🚿 Plomería</option>
            <option value="electricidad">⚡ Electricidad</option>
            <option value="gasista">🔥 Gasista</option>
            <option value="cerrajeria">🔑 Cerrajería</option>
            <option value="domestica">🧹 Servicio Doméstico</option>
            <option value="pintura">🎨 Pintura</option>
            <option value="albanileria">🧱 Albañilería</option>
            <option value="camaras">📷 Cámaras de Seguridad</option>
            <option value="alarmas">🚨 Alarmas</option>
            <option value="aire_acondicionado">❄️ Aire Acondicionado</option>
      <option value="herreria">⚙️ Herrería</option>
      <option value="carpinteria">🪵 Carpintería</option>
      <option value="mudanzas">🚚 Mudanzas</option>
      <option value="jardineria">🌿 Jardinería</option>
      <option value="limpieza">🧽 Limpieza</option>
      <option value="techista">🏚️ Techista</option>
      <option value="impermeabilizacion">💧 Impermeabilización</option>
      <option value="frigorista">🧊 Frigorista</option>
      <option value="electrodomesticos">📺 Electrodomésticos</option>
      <option value="informatica">💻 Informática</option>
      <option value="soldadura">🔩 Soldadura</option>
      <option value="fumigacion">🐜 Fumigación</option>
      <option value="piscinas">🏊 Piscinas</option>
      <option value="ascensores">🛗 Ascensores</option>
      <option value="energia_solar">☀️ Energía Solar</option>
      <option value="cuidado_adultos">👴 Cuidado de Adultos</option>
        </select>
        <button class="btn btn-primary" onclick="conectar()">Conectar</button>
    </div>

    <!-- Dashboard -->
    <div class="section hidden" id="dashboardSection">
        <h3>Estado</h3>
        <button class="btn btn-success" onclick="toggleDisponible(true)">🟢 Estoy Disponible</button>
        <button class="btn btn-danger" onclick="toggleDisponible(false)" style="margin-top:8px;">🔴 Estoy Ocupado</button>
        <div class="gps-indicator hidden" id="gpsIndicator">
            <span class="gps-dot"></span> GPS activo — enviando ubicación
        </div>
    </div>

    <!-- Trabajo activo -->
    <div class="section hidden" id="trabajoActivoSection">
        <h3>Trabajo en Curso</h3>
        <div class="trabajo-activo" id="trabajoActivoCard">
            <h4 id="taServicio">—</h4>
            <p id="taDireccion" style="margin:4px 0;font-size:0.9rem;opacity:0.85;"></p>
            <p id="taDescripcion" style="margin:4px 0;font-size:0.85rem;opacity:0.7;"></p>
        </div>
        <button class="btn btn-purple" onclick="marcarCompletado()">🏁 Marcar como Completado</button>
    </div>

    <!-- Oportunidades -->
    <div class="section hidden" id="oportunidadesSection">
        <h3>Oportunidades de Trabajo</h3>
        <div id="oportunidadesList">
            <p style="color:#64748b;text-align:center;padding:20px;">Esperando oportunidades...</p>
        </div>
    </div>

    <!-- Log -->
    <div class="section">
        <h3>Log de Eventos</h3>
        <div class="log" id="eventLog"></div>
        <button class="btn" onclick="limpiarLog()" style="margin-top:8px;background:#334155;color:#e2e8f0;">Limpiar</button>
    </div>
</div>

<script>
    const socket = io();
    let currentToken = '';
    let currentUserId = '';
    
    // Auto-login: desde localStorage O desde parámetro URL ?t=
    window.onload = () => {
      const params = new URLSearchParams(window.location.search);
      const tUrl   = params.get('t');
      if (tUrl) localStorage.setItem('token', tUrl);
      const t = tUrl || localStorage.getItem('token');
      if (t) {
        document.getElementById('tokenInput').value = t;
      const rub = localStorage.getItem('rubro');
      if (rub) document.getElementById('rubroInput').value = rub;
      conectar();
      }
    };

    let currentRubro = '';
    let currentNombre = '';
    let pedidoActivoId = null;
    let gpsInterval = null;

    function decodeJWT(token) {
        try {
            const payload = token.split('.')[1];
            return JSON.parse(atob(payload.replace(/-/g,'+').replace(/_/g,'/')));
        } catch(e) { return {}; }
    }

    function log(msg, type = 'info') {
        const logDiv = document.getElementById('eventLog');
        const entry = document.createElement('div');
        entry.className = `log-entry ${type}`;
        entry.textContent = `[${new Date().toLocaleTimeString()}] ${msg}`;
        logDiv.insertBefore(entry, logDiv.firstChild);
    }

    function conectar() {
        currentToken = document.getElementById('tokenInput').value.trim();
        currentRubro = document.getElementById('rubroInput').value;
        localStorage.setItem('rubro', currentRubro);
        if (!currentToken) return alert('Token requerido');
        if (!currentRubro && !localStorage.getItem('rubro')) return alert('Seleccioná tu especialidad');
        if (!currentRubro) currentRubro = localStorage.getItem('rubro') || '';

        const decoded = decodeJWT(currentToken);
        currentUserId = decoded.userId || decoded.id || '';
        currentNombre = decoded.nombre || decoded.name || 'Profesional';

        log('Conectando...', 'info');
        document.getElementById('loginSection').classList.add('hidden');
        document.getElementById('dashboardSection').classList.remove('hidden');
        document.getElementById('oportunidadesSection').classList.remove('hidden');
        document.getElementById('statusIndicator').className = 'status online';
        document.getElementById('statusText').textContent = 'Online — ' + currentRubro;
        toggleDisponible(true);
        socket.emit('worker_conectado', {
            userId: currentUserId,
            token: currentToken,
            rubro: currentRubro,
            zona: 'palermo', // zona por defecto, se actualizará con GPS
            nombre: currentNombre
        });
    }

    function toggleDisponible(disponible) {
        socket.emit('cambiar_estado', {
            userId: currentUserId,
            estado: disponible ? 'disponible' : 'ocupado'
        });
        log(`Estado: ${disponible ? 'DISPONIBLE' : 'OCUPADO'}`, disponible ? 'success' : 'error');

        if (disponible) {
            iniciarGPS();
        } else {
            detenerGPS();
        }
    }

    function iniciarGPS() {
        if (gpsInterval) return;
        document.getElementById('gpsIndicator').classList.remove('hidden');
        log('GPS activado', 'success');

        // Enviar posición cada 8 segundos
        gpsInterval = setInterval(() => {
            if (!pedidoActivoId) return; // Solo enviar GPS si hay trabajo activo
            navigator.geolocation.getCurrentPosition(pos => {
                socket.emit('gps_update', {
                    pedidoId: pedidoActivoId,
                    trabajadorId: currentUserId,
                    lat: pos.coords.latitude,
                    lng: pos.coords.longitude
                });
                log(`GPS → ${pos.coords.latitude.toFixed(4)}, ${pos.coords.longitude.toFixed(4)}`, 'info');
            }, err => {
                // Fallback: simular movimiento cerca de Buenos Aires (solo para testing)
                const lat = -34.6 + (Math.random() - 0.5) * 0.02;
                const lng = -58.4 + (Math.random() - 0.5) * 0.02;
                socket.emit('gps_update', {
                    pedidoId: pedidoActivoId,
                    trabajadorId: currentUserId,
                    lat, lng
                });
            });
        }, 8000);
    }

    function detenerGPS() {
        if (gpsInterval) { clearInterval(gpsInterval); gpsInterval = null; }
        document.getElementById('gpsIndicator').classList.add('hidden');
    }

    function aceptarTrabajo(pedidoId, tipoServicio, direccion, descripcion) {
        socket.emit('aceptar_trabajo', {
            pedidoId,
            trabajadorId: currentUserId,
            trabajadorNombre: currentNombre
        });
        log(`Aceptando trabajo ${pedidoId}...`, 'info');

        // Guardar datos del trabajo activo para mostrar en UI
        pedidoActivoId = pedidoId;
        document.getElementById('taServicio').textContent = '🛠️ ' + (tipoServicio || '').toUpperCase();
        document.getElementById('taDireccion').textContent = '📍 ' + (direccion || 'Dirección pendiente');
        document.getElementById('taDescripcion').textContent = descripcion || '';
    }

    function marcarCompletado() {
        if (!pedidoActivoId) return;
        socket.emit('trabajo_completado', {
            pedidoId: pedidoActivoId,
            trabajadorId: currentUserId
        });
        log('Marcando trabajo como completado...', 'info');
    }

    function limpiarLog() { document.getElementById('eventLog').innerHTML = ''; }

    // ── Socket events ────────────────────────────────────────
    socket.on('connect', () => log('Conectado al servidor', 'success'));

    socket.on('conectado_ok', (data) => {
        log(`Autenticado: ${data.socketId}`, 'success');
        document.getElementById('statusIndicator').className = 'status online';
        document.getElementById('statusText').textContent = 'Online — ' + currentRubro;
        document.getElementById('loginSection').classList.add('hidden');
        document.getElementById('dashboardSection').classList.remove('hidden');
        document.getElementById('oportunidadesSection').classList.remove('hidden');
        // Activar disponible automáticamente al conectar
        toggleDisponible(true);
    });

    socket.on('estado_actualizado', (data) => {
        log(`Estado confirmado: ${data.estado}`, 'success');
    });

    socket.on('nueva_oportunidad', (data) => {
        const precio = data.pago_worker || data.total_estimado || 0;
        log(`Nueva oportunidad: ${data.tipoServicio} en ${data.zona} — $${precio.toLocaleString('es-AR')}`, 'success');

        const list = document.getElementById('oportunidadesList');
        // Limpiar placeholder
        const placeholder = list.querySelector('p');
        if (placeholder) placeholder.remove();

        const div = document.createElement('div');
        div.className = 'oportunidad';
        div.id = 'op-' + data.pedidoId;
        div.innerHTML = `
            <h4>🛠️ ${(data.tipoServicio||'').toUpperCase()}</h4>
            <div class="zona">📍 ${data.zona || ''} — ${data.descripcion || 'Sin descripción'}</div>
            <div class="precio">$${precio.toLocaleString('es-AR')} <small style="font-size:0.7rem;opacity:0.7;">(tu parte)</small></div>
            <button class="btn btn-success" style="margin-top:10px;" 
                onclick="aceptarTrabajo('${data.pedidoId}','${data.tipoServicio}','${data.direccion||''}','${data.descripcion||''}');this.closest('.oportunidad').remove()">
                ✅ ACEPTAR TRABAJO
            </button>
        `;
        list.insertBefore(div, list.firstChild);

        if ('Notification' in window && Notification.permission === 'granted') {
            new Notification('🔔 Nuevo trabajo disponible', {
                body: `${data.tipoServicio} en ${data.zona} — $${precio.toLocaleString('es-AR')}`
            });
        }
    });

    socket.on('trabajo_aceptado_ok', (data) => {
        log('¡TRABAJO ACEPTADO! ' + (data.mensaje||''), 'success');
        document.getElementById('trabajoActivoSection').classList.remove('hidden');
        document.getElementById('oportunidadesSection').classList.add('hidden');
        iniciarGPS(); // Arrancar GPS ahora que hay trabajo activo
    });

    socket.on('trabajo_aceptado_error', (data) => {
        log('Error: ' + (data.mensaje || data.error || 'desconocido'), 'error');
        pedidoActivoId = null;
        alert('No se pudo aceptar: ' + (data.mensaje || 'El pedido ya fue tomado'));
    });

    socket.on('trabajo_completado_ok', (data) => {
        log('Trabajo completado confirmado ✓', 'success');
        detenerGPS();
        pedidoActivoId = null;
        document.getElementById('trabajoActivoSection').classList.add('hidden');
        document.getElementById('dashboardSection').classList.remove('hidden');
        document.getElementById('oportunidadesSection').classList.remove('hidden');
        document.getElementById('oportunidadesList').innerHTML = '<p style="color:#64748b;text-align:center;padding:20px;">Esperando oportunidades...</p>';
        toggleDisponible(true);
    });

    socket.on('pedido_tomado', (data) => {
        log('Pedido tomado por otro profesional', 'info');
        const el = document.getElementById('op-' + data.pedidoId);
        if (el) el.remove();
    });

    socket.on('disconnect', () => {
        log('Desconectado del servidor', 'error');
        document.getElementById('statusIndicator').className = 'status offline';
        document.getElementById('statusText').textContent = 'Desconectado';
        detenerGPS();
    });

    if ('Notification' in window && Notification.permission === 'default') {
        Notification.requestPermission();
    }
</script>
</body>
</html>
